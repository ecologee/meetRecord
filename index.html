    {text:"디유넷 실제 서비스 화면 접근 권한 협의",owner:"황태훈",due:"목요일 미팅",status:"s-ongoing"},
    {text:"SaaS 내부 정책 수립 회의",owner:"민영·황태훈·개발팀",due:"제안서 후",status:"s-pending"},
    {text:"건양대 잔금 1.2억 수령",owner:"황태훈",due:"4월 말",status:"s-pending"},
    {text:"부산카대 서비스 시작 일정 재확인",owner:"황태훈",due:"4월 말",status:"s-pending"},
    {text:"AI 튜터 개발 로드맵 확정",owner:"동희·개발팀",due:"미정",status:"s-risk"}
  ],
  risks:["AI 튜터 개발 지연 — 우석대 요구 중인데 클라썸 등 이미 솔루션 보유","계약 구조 취약 — 사전 가격 협의 없는 관행, 라이브 데이터는 사실상 '갑을병정' 중 정(丁)","SaaS 내부 정책 미완성 — 사용량 초과·환불·추가 과금 기준 없음","계약 외 무상 개발 관행 — PDF·영어강의 처리 등 RFP 외 요구 반복 수용","서비스 가시성 부재 — 실제 화면 접근 불가, QA·레퍼런스 활용 제한","대동대 SaaS 단가 저하 — 연 1,800만원 선례, 이후 협상에 불리"],
  opportunities:["건양대 AI 로드맵 — AI 패스파인더 사업 올해·내년 공고 예정","원광대 추가 수요 — AI 튜터·과제평가·강의계획서 3종 업셀링 기회","우석대 AI 튜터 수주 시 첫 대학교 AI 튜터 레퍼런스 확보","디유넷 단독 AI 파트너 — LXP 4강 중 AI 역량 파트너는 라이브 데이터 유일","부산카대 홀딩 해제(4월 말) — 추가 기능 업셀링 전략 수립 가능"]
}
];

var meetings=[],expanded={},activeTabs={},activeAgenda={};

function init(){
  meetings=SEED.slice().sort(function(a,b){return b.date.localeCompare(a.date)});
  buildFilters();render();
}

function buildFilters(){
  var months={},topics={};
  meetings.forEach(function(m){
    months[m.date.slice(0,7)]=true;
    (m.topics||[]).forEach(function(t){topics[t]=true});
  });
  var ms=document.getElementById('filterMonth');
  Object.keys(months).sort().reverse().forEach(function(ym){
    var o=document.createElement('option');o.value=ym;
    o.textContent=ym.replace('-','년 ')+'월';ms.appendChild(o);
  });
  var ts=document.getElementById('filterTopic');
  Object.keys(topics).sort().forEach(function(t){
    var o=document.createElement('option');o.value=t;o.textContent=t;ts.appendChild(o);
  });
}

function render(){
  var q=(document.getElementById('searchQ').value||'').toLowerCase();
  var month=document.getElementById('filterMonth').value;
  var topic=document.getElementById('filterTopic').value;
  var filtered=meetings.filter(function(m){
    if(month&&!m.date.startsWith(month))return false;
    if(topic&&!(m.topics||[]).includes(topic))return false;
    if(q){
      var agText=(m.agendas||[]).map(function(a){return a.title+' '+(a.points||[]).join(' ')}).join(' ');
      var hay=[m.title,m.summary,m.attendees,m.type,(m.topics||[]).join(' '),(m.actions||[]).map(function(a){return a.text}).join(' '),agText].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  document.getElementById('stats').innerHTML=
    '<div class="stat">전체 <span>'+meetings.length+'</span>건</div>'
    +'<div class="stat">검색 결과 <span>'+filtered.length+'</span>건</div>'
    +'<div class="stat">액션 아이템 <span>'+meetings.reduce(function(s,m){return s+(m.actions||[]).length},0)+'</span>개</div>';
  var list=document.getElementById('list');
  if(!filtered.length){list.innerHTML='<div class="empty">검색 결과가 없습니다</div>';return;}
  list.innerHTML=filtered.map(function(m){
    var d=new Date(m.date);
    var mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    var day=String(d.getDate()).padStart(2,'0');
    var isExp=!!expanded[m.id];
    var atab=activeTabs[m.id]||'agenda';
    var aidx=activeAgenda[m.id]||0;
    var topicHtml=(m.topics||[]).map(function(t){
      var hit=q&&t.toLowerCase().includes(q);
      return '<span class="topic-tag'+(hit?' hit':'')+'">'+(t.length>8?t.slice(0,8)+'…':t)+'</span>';
    }).join('');
    var detailHtml='';
    if(isExp){
      var tabs=['agenda','actions','risks'];
      var labels=['안건별 상세','액션 아이템','이슈·기회'];
      var tabHtml=tabs.map(function(t,i){
        return '<button class="dtab'+(atab===t?' active':'')
          +'" onclick="setTab(event,\''+m.id+'\',\''+t+'\')">'+labels[i]+'</button>';
      }).join('');
      var agendas=m.agendas||[];
      var agNavHtml=agendas.map(function(ag,i){
        var shortTitle=ag.title.split('—')[0].split('·')[0].trim();
        if(shortTitle.length>14)shortTitle=shortTitle.slice(0,14)+'…';
        return '<div class="ag-chip'+(aidx===i?' active':'')
          +'" onclick="setAgenda(event,\''+m.id+'\','+i+')">'+shortTitle+'</div>';
      }).join('');
      var curAg=agendas[aidx]||{};
      var agDetailHtml=curAg.title?'<div class="ag-detail"><div class="ag-title">'+curAg.title+'</div><ul class="pts">'+(curAg.points||[]).map(function(p){return '<li>'+p+'</li>'}).join('')+'</ul></div>':'';
      var agContent='<div class="dtab-content'+(atab==='agenda'?' visible':'')+'"><div class="agenda-nav">'+agNavHtml+'</div>'+agDetailHtml+'</div>';
      var statusLabel={s_urgent:'긴급',s_ongoing:'진행중',s_pending:'예정',s_risk:'리스크'};
      var actionRows=(m.actions||[]).map(function(a){
        var sk=a.status.replace('-','_');
        return '<div class="action-row-inner"><div>'+a.text+'</div><div>'+a.owner+'</div><div>'+a.due+'</div><div><span class="'+a.status+'">'+(statusLabel[sk]||a.status)+'</span></div></div>';
      }).join('');
      var actionsContent='<div class="dtab-content'+(atab==='actions'?' visible':'')+'"><div class="action-grid"><div class="action-head">항목</div><div class="action-head">담당</div><div class="action-head">기한</div><div class="action-head">상태</div>'+actionRows+'</div></div>';
      var risksContent='<div class="dtab-content'+(atab==='risks'?' visible':'')+'"><div class="section-label">리스크</div>'+(m.risks||[]).map(function(r){return '<div class="risk-item">'+r+'</div>'}).join('')+'<div class="section-label">기회</div>'+(m.opportunities||[]).map(function(o){return '<div class="opp-item">'+o+'</div>'}).join('')+'</div>';
      detailHtml='<div class="m-detail"><div class="detail-tabs">'+tabHtml+'</div>'+agContent+actionsContent+risksContent+'</div>';
    }
    return '<div class="m-card'+(isExp?' expanded':'')+'" id="mc_'+m.id+'"><div class="m-head" onclick="toggle(\''+m.id+'\')"><div class="m-date-block"><div class="m-month">'+mon+'</div><div class="m-day">'+day+'</div><div class="m-dow">'+m.dow+'</div></div><div class="m-info"><div class="m-title">'+m.title+'</div><div class="m-meta"><span class="badge b-gray">'+m.duration+'</span><span class="badge b-blue">'+m.attendees+'</span><span class="badge b-teal">'+m.type+'</span></div><div class="m-topics">'+topicHtml+'</div></div><div class="m-chevron">⌄</div></div>'+detailHtml+'</div>';
  }).join('');
}

function toggle(id){expanded[id]=!expanded[id];render()}
function setTab(e,id,tab){e.stopPropagation();activeTabs[id]=tab;render()}
function setAgenda(e,id,idx){e.stopPropagation();activeAgenda[id]=idx;render()}

init();
</script>
</body>
</html>
