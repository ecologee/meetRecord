<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의록 허브</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f4f0;padding:2rem 1rem}
.hub{max-width:860px;margin:0 auto;padding:1.25rem 0}
.hub-title{font-size:20px;font-weight:500;margin-bottom:4px}
.hub-sub{font-size:13px;color:#5f5e5a;margin-bottom:1.25rem}
.search-bar{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.search-input{flex:1;min-width:180px;font-size:13px;padding:7px 12px;border:0.5px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
.search-input:focus{border-color:#b4b2a9}
.filter-select{font-size:13px;padding:7px 10px;border:0.5px solid #d3d1c7;border-radius:8px;background:#fff;color:#5f5e5a;outline:none;cursor:pointer}
.stats{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.stat{font-size:12px;padding:3px 10px;border-radius:8px;background:#f0ede6;color:#5f5e5a;border:0.5px solid #d3d1c7}
.stat span{color:#1a1a1a;font-weight:500}
.meeting-list{display:flex;flex-direction:column;gap:10px}
.m-card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.m-card:hover{border-color:#b4b2a9}
.m-card.expanded{border-color:#b4b2a9}
.m-head{display:flex;align-items:flex-start;gap:12px;padding:1rem 1.25rem}
.m-date-block{text-align:center;min-width:44px}
.m-month{font-size:10px;color:#888780;text-transform:uppercase;letter-spacing:.04em}
.m-day{font-size:22px;font-weight:500;line-height:1.1;color:#1a1a1a}
.m-dow{font-size:10px;color:#888780}
.m-info{flex:1;min-width:0}
.m-title{font-size:15px;font-weight:500;margin-bottom:5px}
.m-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:11px;padding:2px 8px;border-radius:8px;border:0.5px solid transparent}
.b-blue{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.b-teal{background:#E1F5EE;color:#085041;border-color:#9FE1CB}
.b-gray{background:#f0ede6;color:#5f5e5a;border-color:#d3d1c7}
.m-topics{display:flex;gap:5px;flex-wrap:wrap}
.topic-tag{font-size:11px;padding:2px 8px;border-radius:8px;background:#f0ede6;color:#5f5e5a}
.topic-tag.hit{background:#E6F1FB;color:#0C447C}
.m-chevron{font-size:16px;color:#888780;margin-left:8px;align-self:center;transition:transform .2s;flex-shrink:0}
.m-card.expanded .m-chevron{transform:rotate(180deg)}
.m-detail{display:none;border-top:0.5px solid #d3d1c7}
.m-card.expanded .m-detail{display:block}
.detail-tabs{display:flex;border-bottom:0.5px solid #d3d1c7;padding:0 1.25rem;overflow-x:auto}
.dtab{font-size:12px;padding:8px 12px;cursor:pointer;color:#5f5e5a;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.dtab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.dtab-content{display:none;padding:1rem 1.25rem;font-size:13px;color:#5f5e5a;line-height:1.7}
.dtab-content.visible{display:block}
.agenda-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.ag-chip{font-size:12px;padding:4px 12px;border-radius:8px;border:0.5px solid #d3d1c7;background:#f0ede6;color:#5f5e5a;cursor:pointer}
.ag-chip.active{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4;font-weight:500}
.ag-detail{background:#f0ede6;border-radius:8px;padding:1rem;border:0.5px solid #d3d1c7}
.ag-title{font-size:14px;font-weight:500;margin-bottom:10px;color:#1a1a1a}
ul.pts{list-style:none;padding:0}
ul.pts li{padding:3px 0 3px 14px;position:relative;font-size:13px;line-height:1.7;color:#5f5e5a}
ul.pts li::before{content:"·";position:absolute;left:0;color:#b4b2a9}
.action-grid{display:grid;grid-template-columns:1fr 80px 80px 64px;gap:6px 10px;font-size:12px}
.action-head{font-size:11px;font-weight:500;color:#5f5e5a;padding-bottom:4px;border-bottom:0.5px solid #d3d1c7}
.action-row-inner{display:contents}
.action-row-inner>div{padding:5px 0;border-bottom:0.5px solid #d3d1c7;color:#5f5e5a;line-height:1.5}
.action-row-inner:last-child>div{border-bottom:none}
.s-urgent{color:#993C1D;background:#FAECE7;padding:1px 6px;border-radius:4px;font-size:11px;display:inline-block}
.s-ongoing{color:#185FA5;background:#E6F1FB;padding:1px 6px;border-radius:4px;font-size:11px;display:inline-block}
.s-pending{color:#5f5e5a;background:#f0ede6;padding:1px 6px;border-radius:4px;font-size:11px;display:inline-block;border:0.5px solid #d3d1c7}
.s-risk{color:#A32D2D;background:#FCEBEB;padding:1px 6px;border-radius:4px;font-size:11px;display:inline-block}
.risk-item{border-left:3px solid #E24B4A;border-radius:0 6px 6px 0;background:#FCEBEB;padding:6px 10px;margin-bottom:6px;font-size:12px;color:#501313;line-height:1.5}
.opp-item{border-left:3px solid #639922;border-radius:0 6px 6px 0;background:#EAF3DE;padding:6px 10px;margin-bottom:6px;font-size:12px;color:#173404;line-height:1.5}
.section-label{font-size:11px;font-weight:500;color:#5f5e5a;text-transform:uppercase;letter-spacing:.05em;margin:1rem 0 6px}
.empty{text-align:center;padding:3rem;color:#888780;font-size:14px}
.loading{text-align:center;padding:3rem;color:#888780;font-size:14px}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.dot{display:inline-block;animation:blink 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
.error-box{background:#FCEBEB;border:0.5px solid #F7C1C1;border-radius:8px;padding:1rem;color:#501313;font-size:13px;text-align:center}
</style>
</head>
<body>
<div class="hub">
  <div class="hub-title">회의록 허브</div>
  <div class="hub-sub">라이브 데이터 AX팀 회의록</div>
  <div class="search-bar">
    <input class="search-input" id="searchQ" type="text" placeholder="키워드, 주제, 참석자, 안건 내용 검색..." oninput="render()">
    <select class="filter-select" id="filterMonth" onchange="render()"><option value="">전체 날짜</option></select>
    <select class="filter-select" id="filterTopic" onchange="render()"><option value="">전체 주제</option></select>
  </div>
  <div class="stats" id="stats"></div>
  <div id="list" class="meeting-list">
    <div class="loading">
      <span class="dot">●</span> <span class="dot">●</span> <span class="dot">●</span>
      <div style="margin-top:8px;font-size:12px">회의록 불러오는 중...</div>
    </div>
  </div>
</div>
<script>
var meetings=[],expanded={},activeTabs={},activeAgenda={};
async function init(){
  try{
    var res=await fetch('./meetings.json?t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    meetings=await res.json();
    meetings.sort(function(a,b){return b.date.localeCompare(a.date)});
    buildFilters();render();
  }catch(e){
    document.getElementById('list').innerHTML='<div class="error-box">회의록을 불러오지 못했습니다.<br><small>'+e.message+'</small></div>';
  }
}
function buildFilters(){
  var months={},topics={};
  meetings.forEach(function(m){
    months[m.date.slice(0,7)]=true;
    (m.topics||[]).forEach(function(t){topics[t]=true});
  });
  var ms=document.getElementById('filterMonth');
  Object.keys(months).sort().reverse().forEach(function(ym){
    var o=document.createElement('option');o.value=ym;o.textContent=ym.replace('-','년 ')+'월';ms.appendChild(o);
  });
  var ts=document.getElementById('filterTopic');
  Object.keys(topics).sort().forEach(function(t){
    var o=document.createElement('option');o.value=t;o.textContent=t;ts.appendChild(o);
  });
}
function render(){
  var q=(document.getElementById('searchQ').value||'').toLowerCase();
  var month=document.getElementById('filterMonth').value;
  var topic=document.getElementById('filterTopic').value;
  var filtered=meetings.filter(function(m){
    if(month&&!m.date.startsWith(month))return false;
    if(topic&&!(m.topics||[]).includes(topic))return false;
    if(q){
      var ag=(m.agendas||[]).map(function(a){return a.title+' '+(a.points||[]).join(' ')}).join(' ');
      var hay=[m.title,m.summary,m.attendees,m.type,(m.topics||[]).join(' '),(m.actions||[]).map(function(a){return a.text}).join(' '),ag].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  document.getElementById('stats').innerHTML=
    '<div class="stat">전체 <span>'+meetings.length+'</span>건</div>'
    +'<div class="stat">검색 결과 <span>'+filtered.length+'</span>건</div>'
    +'<div class="stat">액션 아이템 <span>'+meetings.reduce(function(s,m){return s+(m.actions||[]).length},0)+'</span>개</div>';
  var list=document.getElementById('list');
  if(!filtered.length){list.innerHTML='<div class="empty">검색 결과가 없습니다</div>';return;}
  list.innerHTML=filtered.map(function(m){
    var d=new Date(m.date);
    var mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    var day=String(d.getDate()).padStart(2,'0');
    var isExp=!!expanded[m.id];
    var atab=activeTabs[m.id]||'agenda';
    var aidx=activeAgenda[m.id]||0;
    var topicHtml=(m.topics||[]).map(function(t){
      var hit=q&&t.toLowerCase().includes(q);
      return '<span class="topic-tag'+(hit?' hit':'')+'">'+(t.length>8?t.slice(0,8)+'…':t)+'</span>';
    }).join('');
    var det='';
    if(isExp){
      var tbs=['agenda','actions','risks'],lbs=['안건별 상세','액션 아이템','이슈·기회'];
      var tbH=tbs.map(function(t,i){return '<button class="dtab'+(atab===t?' active':'')+'" onclick="setTab(event,\''+m.id+'\',\''+t+'\')">'+lbs[i]+'</button>'}).join('');
      var ags=m.agendas||[];
      var agN=ags.map(function(ag,i){var s=ag.title.split('—')[0].split('·')[0].trim();if(s.length>14)s=s.slice(0,14)+'…';return '<div class="ag-chip'+(aidx===i?' active':'')+'" onclick="setAgenda(event,\''+m.id+'\','+i+')">'+s+'</div>'}).join('');
      var cur=ags[aidx]||{};
      var agD=cur.title?'<div class="ag-detail"><div class="ag-title">'+cur.title+'</div><ul class="pts">'+(cur.points||[]).map(function(p){return '<li>'+p+'</li>'}).join('')+'</ul></div>':'';
      var agC='<div class="dtab-content'+(atab==='agenda'?' visible':'')+'"><div class="agenda-nav">'+agN+'</div>'+agD+'</div>';
      var sl={s_urgent:'긴급',s_ongoing:'진행중',s_pending:'예정',s_risk:'리스크'};
      var aR=(m.actions||[]).map(function(a){var sk=a.status.replace('-','_');return '<div class="action-row-inner"><div>'+a.text+'</div><div>'+a.owner+'</div><div>'+a.due+'</div><div><span class="'+a.status+'">'+(sl[sk]||a.status)+'</span></div></div>'}).join('');
      var acC='<div class="dtab-content'+(atab==='actions'?' visible':'')+'"><div class="action-grid"><div class="action-head">항목</div><div class="action-head">담당</div><div class="action-head">기한</div><div class="action-head">상태</div>'+aR+'</div></div>';
      var riC='<div class="dtab-content'+(atab==='risks'?' visible':'')+'"><div class="section-label">리스크</div>'+(m.risks||[]).map(function(r){return '<div class="risk-item">'+r+'</div>'}).join('')+'<div class="section-label">기회</div>'+(m.opportunities||[]).map(function(o){return '<div class="opp-item">'+o+'</div>'}).join('')+'</div>';
      det='<div class="m-detail"><div class="detail-tabs">'+tbH+'</div>'+agC+acC+riC+'</div>';
    }
    return '<div class="m-card'+(isExp?' expanded':'')+'" id="mc_'+m.id+'"><div class="m-head" onclick="toggle(\''+m.id+'\')"><div class="m-date-block"><div class="m-month">'+mon+'</div><div class="m-day">'+day+'</div><div class="m-dow">'+m.dow+'</div></div><div class="m-info"><div class="m-title">'+m.title+'</div><div class="m-meta"><span class="badge b-gray">'+m.duration+'</span><span class="badge b-blue">'+m.attendees+'</span><span class="badge b-teal">'+m.type+'</span></div><div class="m-topics">'+topicHtml+'</div></div><div class="m-chevron">⌄</div></div>'+det+'</div>';
  }).join('');
}
function toggle(id){expanded[id]=!expanded[id];render()}
function setTab(e,id,tab){e.stopPropagation();activeTabs[id]=tab;render()}
function setAgenda(e,id,idx){e.stopPropagation();activeAgenda[id]=idx;render()}
init();
</script>
</body>
</html>
