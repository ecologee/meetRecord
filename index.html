<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의록 허브</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f4f0;padding:2rem 1rem}
.page{max-width:860px;margin:0 auto}

/* ── 공통 ── */
.card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:1.25rem;margin-bottom:12px}
.stitle{font-size:12px;font-weight:500;color:#5f5e5a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.badge{font-size:11px;padding:2px 8px;border-radius:8px;border:0.5px solid transparent}
.b-blue{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.b-teal{background:#E1F5EE;color:#085041;border-color:#9FE1CB}
.b-gray{background:#f0ede6;color:#5f5e5a;border-color:#d3d1c7}
.b-amber{background:#FAEEDA;color:#633806;border-color:#FAC775}
.btn{font-size:13px;padding:7px 14px;border-radius:8px;border:0.5px solid #d3d1c7;background:#fff;color:#1a1a1a;cursor:pointer;transition:background .15s}
.btn:hover{background:#f0ede6}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-sm{font-size:12px;padding:4px 10px}
.btn-danger{color:#A32D2D;border-color:#F7C1C1;background:#FCEBEB}
.btn-danger:hover{background:#f7c1c1}
input[type=text],input[type=password],input[type=url],textarea,select{font-size:13px;padding:7px 10px;border:0.5px solid #d3d1c7;border-radius:8px;background:#f0ede6;color:#1a1a1a;outline:none;width:100%}
input:focus,textarea:focus{border-color:#b4b2a9;background:#fff}
textarea{resize:vertical;font-family:inherit}
.hint{font-size:11px;color:#888780;margin-top:3px;line-height:1.5}
.row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
.flex1{flex:1;min-width:0}
.divider{height:0.5px;background:#d3d1c7;margin:14px 0}
.status-row{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:#5f5e5a}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#d3d1c7}
.dot.ok{background:#639922}.dot.err{background:#E24B4A}.dot.spin{background:#378ADD;animation:sp 1s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.3}50%{opacity:1}}

/* ── 관리자 패널 ── */
#adminWrap{display:none;margin-bottom:1.5rem}
#adminWrap.show{display:block}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.admin-header h2{font-size:18px;font-weight:500}
.info-box{background:#E6F1FB;border:0.5px solid #B5D4F4;border-radius:8px;padding:.75rem 1rem;font-size:12px;color:#0C447C;line-height:1.7;margin-bottom:14px}
.info-box code{background:#d4e8f7;padding:1px 5px;border-radius:4px;font-size:11px}
.meeting-edit-list{display:flex;flex-direction:column;gap:8px}
.edit-card{background:#fff;border:0.5px solid #d3d1c7;border-radius:10px;overflow:hidden}
.edit-card-head{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;cursor:pointer;background:#f5f4f0}
.edit-card-head:hover{background:#eeebe4}
.edit-date{font-size:11px;color:#888780;min-width:55px}
.edit-title{font-size:13px;font-weight:500;flex:1}
.edit-chevron{font-size:14px;color:#888780;transition:transform .2s}
.edit-card.open .edit-chevron{transform:rotate(180deg)}
.edit-body{display:none;padding:1rem;border-top:0.5px solid #d3d1c7}
.edit-card.open .edit-body{display:block}
.edit-section{margin-bottom:1.25rem}
.edit-section:last-child{margin-bottom:0}
.edit-label{font-size:12px;font-weight:500;color:#5f5e5a;margin-bottom:6px;display:flex;align-items:center;gap:6px}
/* 링크 */
.link-item{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.link-item input{flex:1}
/* 파일 */
.file-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f0ede6;border-radius:6px;font-size:12px}
.file-item a{color:#185FA5;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item a:hover{text-decoration:underline}
.file-size{color:#888780;font-size:11px;white-space:nowrap}
.upload-zone{border:1.5px dashed #d3d1c7;border-radius:8px;padding:1rem;text-align:center;cursor:pointer;transition:all .15s;font-size:13px;color:#888780}
.upload-zone:hover,.upload-zone.drag{border-color:#378ADD;background:#E6F1FB;color:#0C447C}
.upload-zone input{display:none}
.upload-progress{font-size:12px;color:#185FA5;margin-top:6px;display:none}

/* 전체 동기화 */
.sync-bar{display:flex;align-items:center;gap:10px;padding:1rem;background:#f0ede6;border-radius:10px;flex-wrap:wrap}
.sync-bar .flex1{font-size:13px;color:#5f5e5a}

/* ── 허브 뷰어 ── */
.hub-title{font-size:20px;font-weight:500;margin-bottom:4px}
.hub-sub{font-size:13px;color:#5f5e5a;margin-bottom:1.25rem}
.search-bar{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.search-input{flex:1;min-width:180px}
.filter-select{width:auto}
.stats{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.stat{font-size:12px;padding:3px 10px;border-radius:8px;background:#f0ede6;color:#5f5e5a;border:0.5px solid #d3d1c7}
.stat span{color:#1a1a1a;font-weight:500}
.meeting-list{display:flex;flex-direction:column;gap:10px}
.m-card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.m-card:hover,.m-card.expanded{border-color:#b4b2a9}
.m-head{display:flex;align-items:flex-start;gap:12px;padding:1rem 1.25rem}
.m-date-block{text-align:center;min-width:44px}
.m-month{font-size:10px;color:#888780;text-transform:uppercase;letter-spacing:.04em}
.m-day{font-size:22px;font-weight:500;line-height:1.1}
.m-dow{font-size:10px;color:#888780}
.m-info{flex:1;min-width:0}
.m-title{font-size:15px;font-weight:500;margin-bottom:5px}
.m-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.m-topics{display:flex;gap:5px;flex-wrap:wrap}
.topic-tag{font-size:11px;padding:2px 8px;border-radius:8px;background:#f0ede6;color:#5f5e5a}
.topic-tag.hit{background:#E6F1FB;color:#0C447C}
.m-chevron{font-size:16px;color:#888780;margin-left:8px;align-self:center;transition:transform .2s;flex-shrink:0}
.m-card.expanded .m-chevron{transform:rotate(180deg)}
.m-detail{display:none;border-top:0.5px solid #d3d1c7}
.m-card.expanded .m-detail{display:block}
.detail-tabs{display:flex;border-bottom:0.5px solid #d3d1c7;padding:0 1.25rem;overflow-x:auto}
.dtab{font-size:12px;padding:8px 12px;cursor:pointer;color:#5f5e5a;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.dtab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.dtab-content{display:none;padding:1rem 1.25rem;font-size:13px;color:#5f5e5a;line-height:1.7}
.dtab-content.visible{display:block}
.agenda-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.ag-chip{font-size:12px;padding:4px 12px;border-radius:8px;border:0.5px solid #d3d1c7;background:#f0ede6;color:#5f5e5a;cursor:pointer}
.ag-chip.active{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4;font-weight:500}
.ag-detail{background:#f0ede6;border-radius:8px;padding:1rem;border:0.5px solid #d3d1c7}
.ag-title{font-size:14px;font-weight:500;margin-bottom:10px;color:#1a1a1a}
ul.pts{list-style:none;padding:0}
ul.pts li{padding:3px 0 3px 14px;position:relative;font-size:13px;line-height:1.7;color:#5f5e5a}
ul.pts li::before{content:"·";position:absolute;left:0;color:#b4b2a9}
.action-grid{display:grid;grid-template-columns:1fr 80px 80px 64px;gap:6px 10px;font-size:12px}
.action-head{font-size:11px;font-weight:500;color:#5f5e5a;padding-bottom:4px;border-bottom:0.5px solid #d3d1c7}
.arow{display:contents}
.arow>div{padding:5px 0;border-bottom:0.5px solid #d3d1c7;color:#5f5e5a;line-height:1.5}
.arow:last-child>div{border-bottom:none}
.s-urgent{color:#993C1D;background:#FAECE7;padding:1px 6px;border-radius:4px;font-size:11px;display:inline-block}
.s-ongoing{color:#185FA5;background:#E6F1FB;padding:1px 6px;border-radius:4px;font-size:11px;display:inline-block}
.s-pending{color:#5f5e5a;background:#f0ede6;padding:1px 6px;border-radius:4px;font-size:11px;display:inline-block;border:0.5px solid #d3d1c7}
.s-risk{color:#A32D2D;background:#FCEBEB;padding:1px 6px;border-radius:4px;font-size:11px;display:inline-block}
.risk-item{border-left:3px solid #E24B4A;border-radius:0 6px 6px 0;background:#FCEBEB;padding:6px 10px;margin-bottom:6px;font-size:12px;color:#501313;line-height:1.5}
.opp-item{border-left:3px solid #639922;border-radius:0 6px 6px 0;background:#EAF3DE;padding:6px 10px;margin-bottom:6px;font-size:12px;color:#173404;line-height:1.5}
.sec-label{font-size:11px;font-weight:500;color:#5f5e5a;text-transform:uppercase;letter-spacing:.05em;margin:1rem 0 6px}
/* 메모 탭 */
.memo-box{background:#FAEEDA;border-radius:8px;padding:1rem;font-size:13px;line-height:1.8;color:#412402;white-space:pre-wrap;word-break:break-word}
/* 첨부 탭 */
.attach-link{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f0ede6;border-radius:6px;margin-bottom:6px;font-size:13px;text-decoration:none;color:#185FA5}
.attach-link:hover{background:#e6e2d8}
.attach-link .icon{font-size:14px;flex-shrink:0}
.attach-link .label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-link .meta{font-size:11px;color:#888780;white-space:nowrap}
.attach-file{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f0ede6;border-radius:6px;margin-bottom:6px;font-size:13px}
.attach-file a{color:#185FA5;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-file a:hover{text-decoration:underline}
.attach-file .meta{font-size:11px;color:#888780;white-space:nowrap}
.empty{text-align:center;padding:3rem;color:#888780;font-size:14px}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.blink{display:inline-block;animation:blink 1.2s ease-in-out infinite}
.blink:nth-child(2){animation-delay:.2s}.blink:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>
<div class="page">

<!-- ══ 관리자 패널 ══ -->
<div id="adminWrap">
  <div class="admin-header">
    <h2>관리자 패널</h2>
    <button class="btn btn-sm" onclick="location.href=location.pathname">← 뷰어로 돌아가기</button>
  </div>

  <div class="card">
    <div class="stitle">GitHub 설정</div>
    <div class="info-box">
      토큰은 이 페이지 안에서만 사용돼요. 페이지를 벗어나면 사라지며 저장되지 않아요.<br>
      파일은 저장소 <code>files/{회의ID}/</code> 경로에 자동 업로드됩니다.
    </div>
    <div class="row">
      <div class="flex1">
        <input type="password" id="ghToken" placeholder="GitHub Token (ghp_로 시작)">
      </div>
      <button class="btn" onclick="testToken()">연결 테스트</button>
    </div>
    <div class="status-row" id="tokenStatus" style="display:none">
      <div class="dot" id="tokenDot"></div><span id="tokenMsg"></span>
    </div>
  </div>

  <div class="card">
    <div class="stitle">회의록별 편집</div>
    <div class="meeting-edit-list" id="editList"><div style="font-size:13px;color:#888780">회의록 불러오는 중...</div></div>
  </div>

  <div class="sync-bar">
    <div class="flex1">변경사항을 저장하면 GitHub에 즉시 반영됩니다</div>
    <div class="status-row" id="globalStatus" style="display:none;margin-top:0">
      <div class="dot" id="globalDot"></div><span id="globalMsg"></span>
    </div>
  </div>
</div>

<!-- ══ 허브 뷰어 ══ -->
<div id="hubWrap">
  <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px">
    <div class="hub-title">회의록 허브</div>
    <a id="adminLink" href="?admin" style="font-size:12px;color:#888780;text-decoration:none;display:none">⚙ 관리</a>
  </div>
  <div class="hub-sub">라이브 데이터 AX팀 회의록</div>
  <div class="search-bar">
    <input class="search-input" id="searchQ" type="text" placeholder="키워드, 주제, 참석자, 안건 내용 검색..." oninput="render()">
    <select class="filter-select" id="filterMonth" onchange="render()"><option value="">전체 날짜</option></select>
    <select class="filter-select" id="filterTopic" onchange="render()"><option value="">전체 주제</option></select>
  </div>
  <div class="stats" id="stats"></div>
  <div id="list" class="meeting-list">
    <div style="text-align:center;padding:3rem;color:#888780;font-size:14px">
      <span class="blink">●</span> <span class="blink">●</span> <span class="blink">●</span>
      <div style="margin-top:8px;font-size:12px">회의록 불러오는 중...</div>
    </div>
  </div>
</div>

</div><!-- .page -->
<script>
var OWNER='ecologee', REPO='meetRecord';
var meetings=[], expanded={}, activeTabs={}, activeAgenda={};
var editState={}; // {id: {memo, links:[{title,url}], files:[{name,url,size}]}}
var isAdmin=location.search.includes('admin');

/* ══ 초기화 ══ */
async function init(){
  if(isAdmin){
    document.getElementById('adminWrap').classList.add('show');
    document.getElementById('hubWrap').style.display='none';
  } else {
    document.getElementById('adminLink').style.display='';
  }
  try{
    var res=await fetch('./meetings.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    meetings=await res.json();
    meetings.sort(function(a,b){return b.date.localeCompare(a.date)});
    if(isAdmin){ buildEditList(); }
    else{ buildFilters(); render(); }
  }catch(e){
    if(isAdmin){
      document.getElementById('editList').innerHTML='<div style="color:#A32D2D;font-size:13px">불러오기 실패: '+e.message+'</div>';
    } else {
      document.getElementById('list').innerHTML='<div class="empty">회의록을 불러오지 못했습니다<br><small style="color:#b4b2a9">'+e.message+'</small></div>';
    }
  }
}

/* ══ GitHub 유틸 ══ */
function getToken(){ return document.getElementById('ghToken').value.trim(); }

async function ghGet(path){
  var r=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+path,{
    headers:{'Authorization':'Bearer '+getToken(),'Accept':'application/vnd.github.v3+json'}
  });
  return r;
}
async function ghPut(path, content64, message, sha){
  var body={message:message, content:content64};
  if(sha) body.sha=sha;
  var r=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+path,{
    method:'PUT',
    headers:{'Authorization':'Bearer '+getToken(),'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  return r;
}
async function getSha(path){
  try{ var r=await ghGet(path); if(r.ok){var d=await r.json();return d.sha;} }catch(e){}
  return null;
}

async function testToken(){
  showTokenStatus('spin','연결 확인 중...');
  try{
    var r=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO,{
      headers:{'Authorization':'Bearer '+getToken(),'Accept':'application/vnd.github.v3+json'}
    });
    if(r.ok){ showTokenStatus('ok','연결 성공 ✓'); }
    else{ var d=await r.json(); showTokenStatus('err','오류: '+(d.message||r.status)); }
  }catch(e){ showTokenStatus('err','네트워크 오류: '+e.message); }
}

/* ══ 관리자 — 편집 목록 ══ */
function buildEditList(){
  // init editState from existing data
  meetings.forEach(function(m){
    editState[m.id]={
      memo: m.memo||'',
      links: (m.links||[]).map(function(l){return {title:l.title,url:l.url}}),
      files: (m.files||[]).map(function(f){return {name:f.name,url:f.url,size:f.size||''}})
    };
  });
  var el=document.getElementById('editList');
  el.innerHTML=meetings.map(function(m){
    var d=new Date(m.date);
    var ds=m.date.slice(5).replace('-','/')+'('+m.dow+')';
    return '<div class="edit-card" id="ec_'+m.id+'">'
      +'<div class="edit-card-head" onclick="toggleEdit(\''+m.id+'\')">'
      +'<div class="edit-date">'+ds+'</div>'
      +'<div class="edit-title">'+m.title+'</div>'
      +'<div class="edit-chevron">⌄</div>'
      +'</div>'
      +'<div class="edit-body" id="eb_'+m.id+'">'
        +renderEditBody(m)
      +'</div>'
      +'</div>';
  }).join('');
}

function renderEditBody(m){
  var s=editState[m.id]||{memo:'',links:[],files:[]};
  var linksHtml=s.links.map(function(l,i){
    return '<div class="link-item" id="li_'+m.id+'_'+i+'">'
      +'<input type="text" placeholder="링크 제목" value="'+esc(l.title)+'" oninput="updateLink(\''+m.id+'\','+i+',\'title\',this.value)" style="max-width:180px">'
      +'<input type="url" placeholder="https://" value="'+esc(l.url)+'" oninput="updateLink(\''+m.id+'\','+i+',\'url\',this.value)">'
      +'<button class="btn btn-sm btn-danger" onclick="removeLink(\''+m.id+'\','+i+')">✕</button>'
      +'</div>';
  }).join('');
  var filesHtml=s.files.map(function(f,i){
    return '<div class="file-item">'
      +'<a href="'+f.url+'" target="_blank">📎 '+esc(f.name)+'</a>'
      +'<span class="file-size">'+f.size+'</span>'
      +'<button class="btn btn-sm btn-danger" onclick="removeFile(\''+m.id+'\','+i+')">✕</button>'
      +'</div>';
  }).join('');
  return '<div class="edit-section">'
    +'<div class="edit-label">📝 추가 메모</div>'
    +'<textarea rows="4" placeholder="자유롭게 메모를 작성하세요. 회의록 메모 탭에 표시됩니다." oninput="editState[\''+m.id+'\'].memo=this.value">'+esc(s.memo)+'</textarea>'
    +'</div>'
    +'<div class="edit-section">'
    +'<div class="edit-label">🔗 외부 링크</div>'
    +'<div id="links_'+m.id+'">'+linksHtml+'</div>'
    +'<button class="btn btn-sm" onclick="addLink(\''+m.id+'\')">+ 링크 추가</button>'
    +'</div>'
    +'<div class="edit-section">'
    +'<div class="edit-label">📁 파일 첨부</div>'
    +'<div id="files_'+m.id+'">'+filesHtml+'</div>'
    +'<div class="upload-zone" id="uz_'+m.id+'" onclick="document.getElementById(\'fi_'+m.id+'\').click()" ondragover="dragOver(event,\''+m.id+'\')" ondragleave="dragLeave(\''+m.id+'\')" ondrop="dropFile(event,\''+m.id+'\')">'
    +'파일을 드래그하거나 클릭해서 업로드<br><span style="font-size:11px">GitHub에 자동 저장됩니다</span>'
    +'<input type="file" id="fi_'+m.id+'" multiple style="display:none" onchange="uploadFiles(\''+m.id+'\',this.files)">'
    +'</div>'
    +'<div class="upload-progress" id="up_'+m.id+'"></div>'
    +'</div>'
    +'<div class="divider"></div>'
    +'<button class="btn btn-primary" onclick="saveMeeting(\''+m.id+'\')">이 회의록 저장 및 동기화</button>'
    +'<div class="status-row" id="ms_'+m.id+'" style="display:none;margin-top:8px">'
    +'<div class="dot" id="md_'+m.id+'"></div><span id="mm_'+m.id+'"></span>'
    +'</div>';
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toggleEdit(id){
  var card=document.getElementById('ec_'+id);
  card.classList.toggle('open');
}

/* ── 링크 관리 ── */
function addLink(id){
  editState[id].links.push({title:'',url:''});
  refreshLinks(id);
}
function removeLink(id,i){
  editState[id].links.splice(i,1);
  refreshLinks(id);
}
function updateLink(id,i,field,val){
  editState[id].links[i][field]=val;
}
function refreshLinks(id){
  var m=meetings.find(function(x){return x.id===id;});
  var s=editState[id];
  document.getElementById('links_'+id).innerHTML=s.links.map(function(l,i){
    return '<div class="link-item">'
      +'<input type="text" placeholder="링크 제목" value="'+esc(l.title)+'" oninput="updateLink(\''+id+'\','+i+',\'title\',this.value)" style="max-width:180px">'
      +'<input type="url" placeholder="https://" value="'+esc(l.url)+'" oninput="updateLink(\''+id+'\','+i+',\'url\',this.value)">'
      +'<button class="btn btn-sm btn-danger" onclick="removeLink(\''+id+'\','+i+')">✕</button>'
      +'</div>';
  }).join('');
}

/* ── 파일 업로드 ── */
function dragOver(e,id){e.preventDefault();document.getElementById('uz_'+id).classList.add('drag');}
function dragLeave(id){document.getElementById('uz_'+id).classList.remove('drag');}
function dropFile(e,id){e.preventDefault();dragLeave(id);uploadFiles(id,e.dataTransfer.files);}

async function uploadFiles(id,fileList){
  if(!getToken()){showMeetingStatus(id,'err','토큰을 먼저 입력해주세요');return;}
  var prog=document.getElementById('up_'+id);
  prog.style.display='block';
  for(var i=0;i<fileList.length;i++){
    var file=fileList[i];
    prog.textContent='업로드 중: '+file.name+' ('+Math.round(file.size/1024)+'KB)...';
    try{
      var b64=await readFileAsBase64(file);
      var path='files/'+id+'/'+file.name;
      var sha=await getSha(path);
      var r=await ghPut(path, b64, '파일 업로드: '+file.name, sha);
      if(r.ok){
        var rawUrl='https://raw.githubusercontent.com/'+OWNER+'/'+REPO+'/main/'+path;
        editState[id].files.push({name:file.name,url:rawUrl,size:formatSize(file.size)});
        refreshFiles(id);
        prog.textContent='✓ '+file.name+' 업로드 완료';
      }else{
        var ed=await r.json();
        prog.textContent='✗ 오류: '+(ed.message||r.status);
      }
    }catch(e){prog.textContent='✗ '+e.message;}
  }
  setTimeout(function(){prog.style.display='none';},3000);
}

function readFileAsBase64(file){
  return new Promise(function(resolve,reject){
    var fr=new FileReader();
    fr.onload=function(){resolve(fr.result.split(',')[1]);};
    fr.onerror=reject;
    fr.readAsDataURL(file);
  });
}
function formatSize(bytes){
  if(bytes<1024) return bytes+'B';
  if(bytes<1024*1024) return Math.round(bytes/1024)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}
function removeFile(id,i){
  editState[id].files.splice(i,1);
  refreshFiles(id);
}
function refreshFiles(id){
  var s=editState[id];
  document.getElementById('files_'+id).innerHTML=s.files.map(function(f,i){
    return '<div class="file-item">'
      +'<a href="'+f.url+'" target="_blank">📎 '+esc(f.name)+'</a>'
      +'<span class="file-size">'+f.size+'</span>'
      +'<button class="btn btn-sm btn-danger" onclick="removeFile(\''+id+'\','+i+')">✕</button>'
      +'</div>';
  }).join('');
}

/* ── 회의록 저장 ── */
async function saveMeeting(id){
  if(!getToken()){showMeetingStatus(id,'err','토큰을 먼저 입력해주세요');return;}
  showMeetingStatus(id,'spin','저장 중...');
  var s=editState[id];
  var idx=meetings.findIndex(function(m){return m.id===id;});
  if(idx<0){showMeetingStatus(id,'err','회의록을 찾을 수 없어요');return;}
  meetings[idx].memo=s.memo;
  meetings[idx].links=s.links.filter(function(l){return l.url;});
  meetings[idx].files=s.files;
  var sorted=meetings.slice().sort(function(a,b){return b.date.localeCompare(a.date)});
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(sorted,null,2))));
  var sha=await getSha('meetings.json');
  var r=await ghPut('meetings.json',content,'회의록 업데이트: '+meetings[idx].title,sha);
  if(r.ok){ showMeetingStatus(id,'ok','저장 완료! 페이지 새로고침 시 반영돼요 ✓'); }
  else{ var ed=await r.json(); showMeetingStatus(id,'err','저장 실패: '+(ed.message||r.status)); }
}

/* ── 상태 표시 ── */
function showTokenStatus(t,m){
  var el=document.getElementById('tokenStatus');el.style.display='flex';
  document.getElementById('tokenDot').className='dot '+t;
  document.getElementById('tokenMsg').textContent=m;
}
function showMeetingStatus(id,t,m){
  var el=document.getElementById('ms_'+id);el.style.display='flex';
  document.getElementById('md_'+id).className='dot '+t;
  document.getElementById('mm_'+id).textContent=m;
}

/* ══ 허브 뷰어 ══ */
function buildFilters(){
  var months={},topics={};
  meetings.forEach(function(m){
    months[m.date.slice(0,7)]=true;
    (m.topics||[]).forEach(function(t){topics[t]=true});
  });
  var ms=document.getElementById('filterMonth');
  Object.keys(months).sort().reverse().forEach(function(ym){
    var o=document.createElement('option');o.value=ym;o.textContent=ym.replace('-','년 ')+'월';ms.appendChild(o);
  });
  var ts=document.getElementById('filterTopic');
  Object.keys(topics).sort().forEach(function(t){
    var o=document.createElement('option');o.value=t;o.textContent=t;ts.appendChild(o);
  });
}

function render(){
  var q=(document.getElementById('searchQ').value||'').toLowerCase();
  var month=document.getElementById('filterMonth').value;
  var topic=document.getElementById('filterTopic').value;
  var filtered=meetings.filter(function(m){
    if(month&&!m.date.startsWith(month))return false;
    if(topic&&!(m.topics||[]).includes(topic))return false;
    if(q){
      var ag=(m.agendas||[]).map(function(a){return a.title+' '+(a.points||[]).join(' ')}).join(' ');
      var hay=[m.title,m.summary,m.attendees,m.type,(m.topics||[]).join(' '),(m.actions||[]).map(function(a){return a.text}).join(' '),ag,m.memo||''].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  document.getElementById('stats').innerHTML=
    '<div class="stat">전체 <span>'+meetings.length+'</span>건</div>'
    +'<div class="stat">검색 결과 <span>'+filtered.length+'</span>건</div>'
    +'<div class="stat">액션 아이템 <span>'+meetings.reduce(function(s,m){return s+(m.actions||[]).length},0)+'</span>개</div>';
  var list=document.getElementById('list');
  if(!filtered.length){list.innerHTML='<div class="empty">검색 결과가 없습니다</div>';return;}
  list.innerHTML=filtered.map(function(m){
    var d=new Date(m.date);
    var mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    var day=String(d.getDate()).padStart(2,'0');
    var isExp=!!expanded[m.id];
    var atab=activeTabs[m.id]||'agenda';
    var aidx=activeAgenda[m.id]||0;
    var topicHtml=(m.topics||[]).map(function(t){
      var hit=q&&t.toLowerCase().includes(q);
      return '<span class="topic-tag'+(hit?' hit':'')+'">'+(t.length>8?t.slice(0,8)+'…':t)+'</span>';
    }).join('');

    // extra tab indicators
    var hasMemo=m.memo&&m.memo.trim();
    var hasAttach=(m.links&&m.links.length)||(m.files&&m.files.length);

    var det='';
    if(isExp){
      var tabs=['agenda','actions','risks'];
      var lbs=['안건별 상세','액션 아이템','이슈·기회'];
      if(hasMemo) tabs.push('memo'), lbs.push('메모'+(hasMemo?'':''));
      if(hasAttach) tabs.push('attach'), lbs.push('첨부'+(hasAttach?' ('+(((m.links||[]).length)+((m.files||[]).length))+')':''));

      var tbH=tabs.map(function(t,i){
        return '<button class="dtab'+(atab===t?' active':'')+'" onclick="setTab(event,\''+m.id+'\',\''+t+'\')">'+lbs[i]+'</button>';
      }).join('');

      var ags=m.agendas||[];
      var agN=ags.map(function(ag,i){var s=ag.title.split('—')[0].split('·')[0].trim();if(s.length>14)s=s.slice(0,14)+'…';return '<div class="ag-chip'+(aidx===i?' active':'')+'" onclick="setAgenda(event,\''+m.id+'\','+i+')">'+s+'</div>'}).join('');
      var cur=ags[aidx]||{};
      var agD=cur.title?'<div class="ag-detail"><div class="ag-title">'+cur.title+'</div><ul class="pts">'+(cur.points||[]).map(function(p){return '<li>'+p+'</li>'}).join('')+'</ul></div>':'';
      var agC='<div class="dtab-content'+(atab==='agenda'?' visible':'')+'"><div class="agenda-nav">'+agN+'</div>'+agD+'</div>';

      var sl={s_urgent:'긴급',s_ongoing:'진행중',s_pending:'예정',s_risk:'리스크'};
      var aR=(m.actions||[]).map(function(a){var sk=a.status.replace('-','_');return '<div class="arow"><div>'+a.text+'</div><div>'+a.owner+'</div><div>'+a.due+'</div><div><span class="'+a.status+'">'+(sl[sk]||a.status)+'</span></div></div>'}).join('');
      var acC='<div class="dtab-content'+(atab==='actions'?' visible':'')+'"><div class="action-grid"><div class="action-head">항목</div><div class="action-head">담당</div><div class="action-head">기한</div><div class="action-head">상태</div>'+aR+'</div></div>';

      var riC='<div class="dtab-content'+(atab==='risks'?' visible':'')+'"><div class="sec-label">리스크</div>'+(m.risks||[]).map(function(r){return '<div class="risk-item">'+r+'</div>'}).join('')+'<div class="sec-label">기회</div>'+(m.opportunities||[]).map(function(o){return '<div class="opp-item">'+o+'</div>'}).join('')+'</div>';

      var memoC='<div class="dtab-content'+(atab==='memo'?' visible':'')+'"><div class="memo-box">'+(m.memo||'(메모 없음)')+'</div></div>';

      var linksH=(m.links||[]).map(function(l){return '<a class="attach-link" href="'+l.url+'" target="_blank"><span class="icon">🔗</span><span class="label">'+esc(l.title||l.url)+'</span><span class="meta">↗</span></a>'}).join('');
      var filesH=(m.files||[]).map(function(f){return '<div class="attach-file"><a href="'+f.url+'" target="_blank">📎 '+esc(f.name)+'</a><span class="meta">'+f.size+'</span></div>'}).join('');
      var attachC='<div class="dtab-content'+(atab==='attach'?' visible':'')+'">'+((m.links||[]).length?'<div class="sec-label">링크</div>'+linksH:'')+((m.files||[]).length?'<div class="sec-label">파일</div>'+filesH:'')+(!(m.links||[]).length&&!(m.files||[]).length?'<div style="color:#888780;font-size:13px">첨부 없음</div>':'')+'</div>';

      det='<div class="m-detail"><div class="detail-tabs">'+tbH+'</div>'+agC+acC+riC+memoC+attachC+'</div>';
    }
    return '<div class="m-card'+(isExp?' expanded':'')+'" id="mc_'+m.id+'"><div class="m-head" onclick="toggle(\''+m.id+'\')"><div class="m-date-block"><div class="m-month">'+mon+'</div><div class="m-day">'+day+'</div><div class="m-dow">'+m.dow+'</div></div><div class="m-info"><div class="m-title">'+m.title+(hasMemo?' <span style="font-size:10px;color:#888780">📝</span>':'')+(hasAttach?' <span style="font-size:10px;color:#888780">📎</span>':'')+'</div><div class="m-meta"><span class="badge b-gray">'+m.duration+'</span><span class="badge b-blue">'+m.attendees+'</span><span class="badge b-teal">'+m.type+'</span></div><div class="m-topics">'+topicHtml+'</div></div><div class="m-chevron">⌄</div></div>'+det+'</div>';
  }).join('');
}
function toggle(id){expanded[id]=!expanded[id];render();}
function setTab(e,id,tab){e.stopPropagation();activeTabs[id]=tab;render();}
function setAgenda(e,id,idx){e.stopPropagation();activeAgenda[id]=idx;render();}

init();
</script>
